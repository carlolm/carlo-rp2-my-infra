version: '3.8'

services:
  caddy:
    image: slothcroissant/caddy-cloudflaredns:latest
    container_name: caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./data:/data
      - ./config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    container_name: oauth2-proxy
    restart: always
    environment:
      OAUTH2_PROXY_PROVIDER: google
      OAUTH2_PROXY_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_AUTHENTICATED_EMAILS_FILE: /config/allowed_emails.txt
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_REDIRECT_URL: https://auth.carlolm.com/oauth2/callback
      OAUTH2_PROXY_COOKIE_DOMAINS: .carlolm.com
      OAUTH2_PROXY_WHITELIST_DOMAINS: .carlolm.com
      OAUTH2_PROXY_REVERSE_PROXY: "true"
    volumes:
      - ./allowed_emails.txt:/config/allowed_emails.txt

  # Public ingress. Token-based (remotely-managed) tunnel "rp2-apps":
  # public-hostname routing is configured in the Cloudflare dashboard, not here.
  # Shares internal_apps_network so it can reach the `caddy` container by name,
  # keeping all public traffic behind the oauth2-proxy gate.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}

networks:
  default:
    name: internal_apps_network
